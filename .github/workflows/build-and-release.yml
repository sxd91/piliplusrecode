name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/generated/**'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Optional release version override. Empty = auto bump latest vX.Y.Z tag, for example 0.1.0 -> 0.2.0.'
        required: false
        type: string
      release_tag:
        description: 'Optional release tag override. Empty = v<auto_version>.'
        required: false
        type: string
      android_liquid_glass_repository:
        description: 'GitHub repository or URL for AndroidLiquidGlass-kmp.'
        required: false
        default: 'sxd91/AndroidLiquidGlass'
        type: string

permissions:
  contents: write
  actions: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
      release_body_path: .github/generated/last-detected-changes.md
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version
        id: version
        shell: bash
        run: |
          VERSION_NAME_INPUT='${{ inputs.version_name }}'
          VERSION_CODE="$(grep 'versionCode =' androidApp/build.gradle.kts | sed 's/[^0-9]//g' | head -1)"

          if [ -n "$VERSION_NAME_INPUT" ]; then
            VERSION_NAME="$VERSION_NAME_INPUT"
          else
            LATEST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)"
            if [ -z "$LATEST_TAG" ]; then
              VERSION_NAME="0.1.0"
            else
              BASE_VERSION="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
              VERSION_NAME="${MAJOR:-0}.$(( ${MINOR:-0} + 1 )).0"
            fi
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE:-1}" >> "$GITHUB_OUTPUT"

      - name: Generate detected change summary
        id: diff
        shell: bash
        run: |
          mkdir -p .github/generated
          BASE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          fi

          {
            echo "# Last detected changes"
            echo
            echo "Generated by GitHub Actions for commit \`${GITHUB_SHA}\`."
            echo
            echo "## Changed files"
            echo
            git diff --name-status "$BASE"..HEAD -- . ':!.github/generated/**' ':!CHANGELOG.md' | awk 'NF {print "- `" $1 "` " $2}' || true
            echo
            echo "## Commit messages"
            echo
            git log "$BASE"..HEAD --pretty=format:'- %s (%h)' --no-merges || true
          } > .github/generated/last-detected-changes.md

          if [ -s .github/generated/last-detected-changes.md ] && git diff --quiet --exit-code -- . ':!.github/generated/**' ':!CHANGELOG.md'; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated change summary on push
        if: github.event_name == 'push'
        shell: bash
        run: |
          if git diff --quiet -- .github/generated/last-detected-changes.md; then
            echo "Generated change summary unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/generated/last-detected-changes.md
          git commit -m "chore: update detected change summary [skip ci]"
          git push

      - name: Upload detected change summary
        uses: actions/upload-artifact@v4
        with:
          name: detected-changes
          path: .github/generated/last-detected-changes.md
          if-no-files-found: error

  build:
    name: Build unsigned packages
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: android-desktop-linux
            tasks: :androidApp:assembleRelease :desktopApp:packageDeb
            artifact_glob: |
              recodeing/androidApp/build/outputs/apk/release/*.apk
              recodeing/desktopApp/build/compose/binaries/main/deb/*.deb
          - os: windows-latest
            name: desktop-windows
            tasks: :desktopApp:packageMsi
            artifact_glob: recodeing/desktopApp/build/compose/binaries/main/msi/*.msi
          - os: macos-latest
            name: apple-desktop-macos
            tasks: :desktopApp:packageDmg :macosApp:macosArm64Binaries
            artifact_glob: |
              recodeing/desktopApp/build/compose/binaries/main/dmg/*.dmg
              recodeing/macosApp/build/bin/macosArm64/releaseExecutable/*
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout recodeing
        uses: actions/checkout@v4
        with:
          path: recodeing
          fetch-depth: 0

      - name: Checkout Miuix sibling build
        uses: actions/checkout@v4
        with:
          repository: compose-miuix-ui/miuix
          path: miuix

      - name: Resolve AndroidLiquidGlass-kmp repository
        id: liquid_glass
        shell: bash
        run: |
          REPO='${{ inputs.android_liquid_glass_repository }}'
          if [ -z "$REPO" ]; then
            REPO='${{ vars.ANDROID_LIQUID_GLASS_REPOSITORY }}'
          fi
          if [ -z "$REPO" ]; then
            REPO='sxd91/AndroidLiquidGlass'
          fi
          REPO="${REPO#https://github.com/}"
          REPO="${REPO#http://github.com/}"
          REPO="${REPO#git@github.com:}"
          REPO="${REPO%.git}"
          REPO="${REPO%/}"
          if ! echo "$REPO" | grep -Eq '^[^/]+/[^/]+$'; then
            echo "Invalid AndroidLiquidGlass repository '$REPO'. Expected owner/repo or GitHub URL." >&2
            exit 1
          fi
          echo "repository=$REPO" >> "$GITHUB_OUTPUT"

      - name: Checkout AndroidLiquidGlass-kmp sibling build
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.liquid_glass.outputs.repository }}
          path: AndroidLiquidGlass-kmp

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        if: matrix.name == 'android-desktop-linux'
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build unsigned packages
        working-directory: recodeing
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew ${{ matrix.tasks }} --build-cache

      - name: Upload unsigned package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: [detect-changes, build]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download detected changes
        uses: actions/download-artifact@v4
        with:
          name: detected-changes
          path: release-notes

      - name: Download unsigned packages
        uses: actions/download-artifact@v4
        with:
          pattern: unsigned-*
          path: release-artifacts
          merge-multiple: true

      - name: Prepare release notes and tag
        id: release
        shell: bash
        run: |
          VERSION='${{ needs.detect-changes.outputs.version_name }}'
          TAG_INPUT='${{ inputs.release_tag }}'
          TAG="${TAG_INPUT:-v${VERSION}}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          {
            echo "# PiliPlus Recodeing ${VERSION}"
            echo
            echo "Unsigned cross-platform build artifacts. Android and desktop/macOS outputs are intentionally not signed."
            echo
            if [ -f release-notes/last-detected-changes.md ]; then
              cat release-notes/last-detected-changes.md
            else
              echo "No detected change summary artifact was produced."
            fi
          } > RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
