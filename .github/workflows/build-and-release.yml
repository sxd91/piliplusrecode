name: Build & Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/generated/**'
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Optional release version override. Empty = auto bump latest vX.Y.Z tag, for example 0.1.0 -> 0.2.0.'
        required: false
        type: string
      release_tag:
        description: 'Optional release tag override. Empty = v<auto_version>.'
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed files
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
      release_body_path: .github/generated/last-detected-changes.md
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect version
        id: version
        shell: bash
        run: |
          VERSION_NAME_INPUT='${{ inputs.version_name }}'
          VERSION_CODE="$(grep 'versionCode =' androidApp/build.gradle.kts | sed 's/[^0-9]//g' | head -1)"

          if [ -n "$VERSION_NAME_INPUT" ]; then
            VERSION_NAME="$VERSION_NAME_INPUT"
          else
            LATEST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1)"
            if [ -z "$LATEST_TAG" ]; then
              VERSION_NAME="0.1.0"
            else
              BASE_VERSION="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
              VERSION_NAME="${MAJOR:-0}.$(( ${MINOR:-0} + 1 )).0"
            fi
          fi

          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE:-1}" >> "$GITHUB_OUTPUT"

      - name: Generate detected change summary
        id: diff
        shell: bash
        run: |
          mkdir -p .github/generated
          BASE=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
          else
            BASE="$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)"
          fi

          {
            echo "# Last detected changes"
            echo
            echo "Generated by GitHub Actions for commit \`${GITHUB_SHA}\`."
            echo
            echo "## Changed files"
            echo
            git diff --name-status "$BASE"..HEAD -- . ':!.github/generated/**' ':!CHANGELOG.md' | awk 'NF {print "- `" $1 "` " $2}' || true
            echo
            echo "## Commit messages"
            echo
            git log "$BASE"..HEAD --pretty=format:'- %s (%h)' --no-merges || true
          } > .github/generated/last-detected-changes.md

          if [ -s .github/generated/last-detected-changes.md ] && git diff --quiet --exit-code -- . ':!.github/generated/**' ':!CHANGELOG.md'; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload detected change summary
        uses: actions/upload-artifact@v7
        with:
          name: detected-changes
          path: .github/generated/last-detected-changes.md
          if-no-files-found: error

  build:
    name: Build unsigned packages
    needs: detect-changes
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: android-desktop-linux
            tasks: :androidApp:assembleRelease :androidApp:assembleDebug :desktopApp:packageDeb
            artifact_glob: |
              recodeing/androidApp/build/outputs/apk/release/*.apk
              recodeing/androidApp/build/outputs/apk/debug/*.apk
              recodeing/desktopApp/build/compose/binaries/main/deb/*.deb
          - os: windows-latest
            name: desktop-windows
            tasks: :desktopApp:packageMsi
            artifact_glob: recodeing/desktopApp/build/compose/binaries/main/msi/*.msi
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout recodeing
        uses: actions/checkout@v7
        with:
          path: recodeing
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        if: matrix.name == 'android-desktop-linux'
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-home-cache-cleanup: true

      - name: Build unsigned packages
        working-directory: recodeing
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew ${{ matrix.tasks }} --build-cache

      - name: Add debug suffixes
        working-directory: recodeing
        shell: bash
        run: |
          if [ "${{ matrix.name }}" = "android-desktop-linux" ]; then
            for file in androidApp/build/outputs/apk/debug/*.apk; do
              [ -e "$file" ] || continue
              case "$file" in *-debug.apk) ;; *) mv "$file" "${file%.apk}-debug.apk" ;; esac
            done
            for file in desktopApp/build/compose/binaries/main/deb/*.deb; do
              [ -e "$file" ] || continue
              case "$file" in *-debug.deb) ;; *) mv "$file" "${file%.deb}-debug.deb" ;; esac
            done
          else
            for file in desktopApp/build/compose/binaries/main/msi/*.msi; do
              [ -e "$file" ] || continue
              case "$file" in *-debug.msi) ;; *) mv "$file" "${file%.msi}-debug.msi" ;; esac
            done
          fi

      - name: Upload unsigned package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-${{ matrix.name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: [detect-changes, build]
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download detected changes
        uses: actions/download-artifact@v8
        with:
          name: detected-changes
          path: release-notes

      - name: Download unsigned packages
        uses: actions/download-artifact@v8
        with:
          pattern: unsigned-*
          path: release-artifacts
          merge-multiple: true

      - name: Prepare release notes and tag
        id: release
        shell: bash
        run: |
          VERSION='${{ needs.detect-changes.outputs.version_name }}'
          TAG_INPUT='${{ inputs.release_tag }}'
          TAG="${TAG_INPUT:-v${VERSION}}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          {
            echo "# reliqliquid ${VERSION}"
            echo
            echo "Unsigned Android and Linux/Windows desktop artifacts. Files ending in -debug include persistent startup/crash logging. Apple targets are not published."
            echo
            if [ -f release-notes/last-detected-changes.md ]; then
              cat release-notes/last-detected-changes.md
            else
              echo "No detected change summary artifact was produced."
            fi
          } > RELEASE_NOTES.md

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release-artifacts/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
